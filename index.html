<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CryptoScope</title>
<!-- PWA iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CryptoScope">
<meta name="theme-color" content="#080c14">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080c14'/><text y='68' x='50' text-anchor='middle' font-size='55'>◈</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1421;
    --card: #111827;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #00e5a0;
    --red: #ff4365;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: 0 0 30px rgba(0,212,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 30px 20px 20px;
    position: relative;
    z-index: 1;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 15px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
  }

  .logo-text {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* TOP BAR - Crypto List */
  .crypto-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 10px;
    margin: 20px 0;
  }

  .crypto-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .crypto-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.05), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .crypto-card:hover::before,
  .crypto-card.active::before {
    opacity: 1;
  }

  .crypto-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), var(--glow);
  }

  .crypto-card:hover {
    border-color: rgba(0,212,255,0.4);
    transform: translateY(-2px);
  }

  .crypto-header-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .crypto-img {
    width: 26px;
    height: 26px;
    border-radius: 50%;
  }

  .crypto-symbol {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .crypto-name-card {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .crypto-price-card {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .crypto-change {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
  }

  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* MAIN AREA */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* CHART PANEL */
  .chart-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
  }

  .chart-panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .selected-crypto-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .selected-img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

  .selected-name {
    font-size: 22px;
    font-weight: 800;
  }

  .selected-price {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  .selected-change-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    margin-left: 8px;
  }

  .badge-pos { background: rgba(0,229,160,0.15); color: var(--green); }
  .badge-neg { background: rgba(255,67,101,0.15); color: var(--red); }

  .period-tabs {
    display: flex;
    gap: 6px;
  }

  .period-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 11px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .period-btn:hover { color: var(--text); border-color: var(--accent); }
  .period-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .chart-wrap {
    position: relative;
    height: 300px;
  }

  .chart-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card);
    border-radius: 8px;
    z-index: 10;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* SIMULATOR PANEL */
  .sim-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .sim-title {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sim-title span {
    background: linear-gradient(90deg, var(--gold), #fb923c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  input[type="number"],
  input[type="date"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus { border-color: var(--accent); }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.5);
  }

  .sim-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .sim-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,212,255,0.3);
  }

  .sim-btn:active { transform: translateY(0); }

  /* RESULT */
  .sim-result {
    background: var(--surface);
    border-radius: 12px;
    padding: 18px;
    border: 1px solid var(--border);
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .sim-result.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }

  .result-row:last-child { border-bottom: none; }

  .result-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .result-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
  }

  .result-pnl {
    text-align: center;
    padding: 14px 0 6px;
  }

  .pnl-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .pnl-value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .pnl-pct {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    margin-top: 2px;
  }

  /* ERROR */
  .error-msg {
    background: rgba(255,67,101,0.1);
    border: 1px solid rgba(255,67,101,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--red);
    display: none;
  }

  .error-msg.show { display: block; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .selected-price { font-size: 22px; }
    .period-tabs { flex-wrap: wrap; }
  }

  .refresh-info {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    padding: 10px 0 20px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">◈</div>
      <div>
        <div class="logo-text">CryptoScope</div>
        <div class="logo-sub">Données temps réel · CoinGecko API</div>
      </div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span id="lastUpdate">Chargement...</span>
    </div>
  </div>
</header>

<div class="container">

  <!-- TOP CRYPTO CARDS -->
  <div class="crypto-list" id="cryptoList">
    <!-- Généré dynamiquement -->
    <div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--muted); font-family:'Space Mono',monospace; font-size:12px;">
      Chargement des cryptos...
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-card">
      <div class="stat-label">Market Cap</div>
      <div class="stat-value" id="statMcap">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Volume 24h</div>
      <div class="stat-value" id="statVol">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ATH</div>
      <div class="stat-value" id="statAth">—</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- CHART -->
    <div class="chart-panel">
      <div class="chart-panel-header">
        <div>
          <div class="selected-crypto-info" id="selectedInfo">
            <div style="color:var(--muted);font-size:14px;">← Sélectionnez une crypto</div>
          </div>
        </div>
        <div class="period-tabs" id="periodTabs" style="display:none;">
          <button class="period-btn" data-days="30">1M</button>
          <button class="period-btn active" data-days="180">6M</button>
          <button class="period-btn" data-days="365">1A</button>
          <button class="period-btn" data-days="730">2A</button>
        </div>
      </div>
      <div class="chart-wrap">
        <div class="chart-loading" id="chartLoading" style="display:none;">
          <div class="spinner"></div>
        </div>
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <!-- SIMULATOR -->
    <div class="sim-panel">
      <div class="sim-title">💰 <span>Simulateur d'investissement</span></div>

      <div class="form-group">
        <label>Montant investi (€ / $)</label>
        <input type="number" id="simAmount" placeholder="Ex: 1000" min="1" step="any">
      </div>

      <div class="form-group">
        <label>Date d'achat</label>
        <input type="date" id="simDate">
      </div>

      <div class="error-msg" id="simError"></div>

      <button class="sim-btn" id="simBtn" onclick="simulate()">
        Calculer la plus-value →
      </button>

      <div class="sim-result" id="simResult">
        <div class="pnl-label">Plus-value nette</div>
        <div class="result-pnl">
          <div class="pnl-value" id="pnlValue">—</div>
          <div class="pnl-pct" id="pnlPct">—</div>
        </div>
        <div class="result-row">
          <span class="result-label">Investi</span>
          <span class="result-value" id="resInvested">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Prix d'achat</span>
          <span class="result-value" id="resBuyPrice">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Quantité achetée</span>
          <span class="result-value" id="resQty">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Prix actuel</span>
          <span class="result-value" id="resCurrentPrice">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Valeur actuelle</span>
          <span class="result-value" id="resCurrentValue">—</span>
        </div>
      </div>
    </div>

  </div>

  <div class="refresh-info" id="refreshInfo"></div>

</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────
const TOP_CRYPTOS = [
  'bitcoin','ethereum','binancecoin','solana','ripple',
  'cardano','dogecoin','avalanche-2','chainlink','polkadot',
  'tron','shiba-inu','litecoin','uniswap','near'
];

let allData = {};
let selectedCoin = null;
let chart = null;
let currentDays = 180;

// ─── FORMAT ───────────────────────────────────────────────────────────
const fmtPrice = (n, decimals = 2) => {
  if (n >= 1000) return '$' + n.toLocaleString('fr-FR', {maximumFractionDigits: 0});
  if (n >= 1) return '$' + n.toFixed(decimals);
  if (n >= 0.01) return '$' + n.toFixed(4);
  return '$' + n.toFixed(6);
};

const fmtBig = (n) => {
  if (!n) return '—';
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  return '$' + n.toLocaleString();
};

const fmtDate = (ts) => {
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'});
};

// ─── FETCH TOP CRYPTOS ────────────────────────────────────────────────
async function fetchTopCryptos() {
  try {
    const ids = TOP_CRYPTOS.join(',');
    const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=15&page=1&sparkline=false&price_change_percentage=24h,7d`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();

    data.forEach(coin => { allData[coin.id] = coin; });
    renderCryptoList(data);

    document.getElementById('lastUpdate').textContent =
      'Mis à jour ' + new Date().toLocaleTimeString('fr-FR');

    // Auto-select bitcoin on first load
    if (!selectedCoin && data.length > 0) {
      selectCoin(data[0].id);
    } else if (selectedCoin) {
      updateStats(allData[selectedCoin]);
    }
  } catch (e) {
    document.getElementById('cryptoList').innerHTML =
      `<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--red);font-family:'Space Mono',monospace;font-size:12px;">
        ⚠ Erreur de chargement. Vérifiez votre connexion.<br><small style="color:var(--muted)">${e.message}</small>
      </div>`;
  }
}

// ─── RENDER CRYPTO LIST ───────────────────────────────────────────────
function renderCryptoList(data) {
  const list = document.getElementById('cryptoList');
  list.innerHTML = data.map(coin => {
    const chg = coin.price_change_percentage_24h || 0;
    const isPos = chg >= 0;
    return `
    <div class="crypto-card ${selectedCoin === coin.id ? 'active' : ''}"
         id="card-${coin.id}"
         onclick="selectCoin('${coin.id}')">
      <div class="crypto-header-row">
        <img class="crypto-img" src="${coin.image}" alt="${coin.name}" loading="lazy">
        <div>
          <div class="crypto-name-card">${coin.name}</div>
          <div class="crypto-symbol">${coin.symbol}</div>
        </div>
      </div>
      <div class="crypto-price-card">${fmtPrice(coin.current_price)}</div>
      <div class="crypto-change ${isPos ? 'pos' : 'neg'}">
        ${isPos ? '▲' : '▼'} ${Math.abs(chg).toFixed(2)}% 24h
      </div>
    </div>`;
  }).join('');
}

// ─── SELECT COIN ──────────────────────────────────────────────────────
async function selectCoin(id) {
  // Update active card
  document.querySelectorAll('.crypto-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('active');

  selectedCoin = id;
  const coin = allData[id];

  // Update header info
  const chg = coin.price_change_percentage_24h || 0;
  const isPos = chg >= 0;
  document.getElementById('selectedInfo').innerHTML = `
    <img class="selected-img" src="${coin.image}" alt="${coin.name}">
    <div>
      <div class="selected-name">${coin.name}</div>
      <div>
        <span class="selected-price">${fmtPrice(coin.current_price)}</span>
        <span class="selected-change-badge ${isPos ? 'badge-pos' : 'badge-neg'}">
          ${isPos ? '▲' : '▼'} ${Math.abs(chg).toFixed(2)}%
        </span>
      </div>
    </div>`;

  document.getElementById('periodTabs').style.display = 'flex';
  document.getElementById('statsRow').style.display = 'grid';
  updateStats(coin);

  // Reset simulator result
  document.getElementById('simResult').classList.remove('show');
  document.getElementById('simError').classList.remove('show');

  // Fetch chart
  await fetchChart(id, currentDays);
}

// ─── UPDATE STATS ─────────────────────────────────────────────────────
function updateStats(coin) {
  document.getElementById('statMcap').textContent = fmtBig(coin.market_cap);
  document.getElementById('statVol').textContent = fmtBig(coin.total_volume);
  document.getElementById('statAth').textContent = fmtPrice(coin.ath || 0);
}

// ─── FETCH CHART DATA ─────────────────────────────────────────────────
async function fetchChart(id, days) {
  currentDays = days;

  // Update period tabs
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.days) === days);
  });

  document.getElementById('chartLoading').style.display = 'flex';

  try {
    const url = `https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=${days}&interval=daily`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    renderChart(data.prices, allData[id]);
  } catch (e) {
    console.error('Chart error:', e);
  } finally {
    document.getElementById('chartLoading').style.display = 'none';
  }
}

// ─── RENDER CHART ─────────────────────────────────────────────────────
function renderChart(prices, coin) {
  const labels = prices.map(p => new Date(p[0]));
  const values = prices.map(p => p[1]);

  const startPrice = values[0];
  const endPrice = values[values.length - 1];
  const isGain = endPrice >= startPrice;
  const color = isGain ? '#00e5a0' : '#ff4365';

  if (chart) chart.destroy();

  const ctx = document.getElementById('priceChart').getContext('2d');

  const gradient = ctx.createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, isGain ? 'rgba(0,229,160,0.25)' : 'rgba(255,67,101,0.25)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: color,
        backgroundColor: gradient,
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: color,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111827',
          borderColor: '#1e2d45',
          borderWidth: 1,
          titleColor: '#64748b',
          bodyColor: '#e2e8f0',
          titleFont: { family: 'Space Mono', size: 10 },
          bodyFont: { family: 'Space Mono', size: 13 },
          callbacks: {
            title: (items) => fmtDate(items[0].parsed.x),
            label: (item) => ' ' + fmtPrice(item.parsed.y)
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: currentDays <= 30 ? 'day' : currentDays <= 180 ? 'week' : 'month' },
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: {
            color: '#475569',
            font: { family: 'Space Mono', size: 10 },
            maxTicksLimit: 8
          }
        },
        y: {
          position: 'right',
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: {
            color: '#475569',
            font: { family: 'Space Mono', size: 10 },
            callback: (v) => fmtPrice(v, 0)
          }
        }
      }
    }
  });

  // Update refresh info
  const pct = ((endPrice - startPrice) / startPrice * 100).toFixed(1);
  document.getElementById('refreshInfo').textContent =
    `Sur cette période : ${isGain ? '+' : ''}${pct}%  ·  Données : CoinGecko`;
}

// ─── SIMULATOR ────────────────────────────────────────────────────────
async function simulate() {
  const errorEl = document.getElementById('simError');
  const resultEl = document.getElementById('simResult');
  errorEl.classList.remove('show');
  resultEl.classList.remove('show');

  if (!selectedCoin) {
    showError('Sélectionnez d\'abord une crypto.');
    return;
  }

  const amount = parseFloat(document.getElementById('simAmount').value);
  const dateStr = document.getElementById('simDate').value;

  if (!amount || amount <= 0) {
    showError('Entrez un montant valide.');
    return;
  }

  if (!dateStr) {
    showError('Entrez une date d\'achat.');
    return;
  }

  const buyDate = new Date(dateStr);
  const today = new Date();
  const minDate = new Date();
  minDate.setFullYear(minDate.getFullYear() - 2);
  minDate.setDate(minDate.getDate() - 1);

  if (buyDate >= today) {
    showError('La date doit être dans le passé.');
    return;
  }

  if (buyDate < new Date('2013-01-01')) {
    showError('Données disponibles depuis 2013.');
    return;
  }

  document.getElementById('simBtn').textContent = 'Calcul en cours...';
  document.getElementById('simBtn').disabled = true;

  try {
    const days = Math.ceil((today - buyDate) / (1000 * 60 * 60 * 24));
    const safeDays = Math.min(days + 5, 3650);

    const url = `https://api.coingecko.com/api/v3/coins/${selectedCoin}/market_chart?vs_currency=usd&days=${safeDays}&interval=daily`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();

    // Find closest price to buy date
    const buyTs = buyDate.getTime();
    let closest = data.prices.reduce((prev, curr) =>
      Math.abs(curr[0] - buyTs) < Math.abs(prev[0] - buyTs) ? curr : prev
    );

    const buyPrice = closest[1];
    const currentPrice = allData[selectedCoin].current_price;
    const qty = amount / buyPrice;
    const currentValue = qty * currentPrice;
    const pnl = currentValue - amount;
    const pnlPct = (pnl / amount) * 100;
    const isPos = pnl >= 0;

    // Display results
    document.getElementById('pnlValue').textContent =
      (isPos ? '+' : '') + pnl.toLocaleString('fr-FR', {style:'currency', currency:'USD', maximumFractionDigits: 2});
    document.getElementById('pnlValue').className = 'pnl-value ' + (isPos ? 'pos' : 'neg');

    document.getElementById('pnlPct').textContent =
      (isPos ? '▲ +' : '▼ ') + pnlPct.toFixed(2) + '%';
    document.getElementById('pnlPct').className = 'pnl-pct ' + (isPos ? 'pos' : 'neg');

    document.getElementById('resInvested').textContent =
      amount.toLocaleString('fr-FR', {style:'currency', currency:'USD'});
    document.getElementById('resBuyPrice').textContent = fmtPrice(buyPrice);
    document.getElementById('resQty').textContent =
      qty < 1 ? qty.toFixed(8) + ' ' + allData[selectedCoin].symbol.toUpperCase()
               : qty.toFixed(4) + ' ' + allData[selectedCoin].symbol.toUpperCase();
    document.getElementById('resCurrentPrice').textContent = fmtPrice(currentPrice);
    document.getElementById('resCurrentValue').textContent =
      currentValue.toLocaleString('fr-FR', {style:'currency', currency:'USD', maximumFractionDigits: 2});

    resultEl.classList.add('show');

  } catch (e) {
    showError('Erreur lors du calcul. Réessayez dans un moment (limite API).');
    console.error(e);
  } finally {
    document.getElementById('simBtn').textContent = 'Calculer la plus-value →';
    document.getElementById('simBtn').disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('simError');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}

// ─── PERIOD TABS ──────────────────────────────────────────────────────
document.getElementById('periodTabs').addEventListener('click', (e) => {
  if (e.target.classList.contains('period-btn') && selectedCoin) {
    fetchChart(selectedCoin, parseInt(e.target.dataset.days));
  }
});
