<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cryptime</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cryptime">
<meta name="theme-color" content="#06080f">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080f;
  --s1: #0b0f1a;
  --s2: #111827;
  --s3: #1a2332;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #e8ff47;
  --accent2: #ff6b35;
  --blue: #4da6ff;
  --green: #3dffa0;
  --red: #ff4466;
  --text: #f0f4ff;
  --muted: #556070;
  --muted2: #8899aa;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height: -webkit-fill-available; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── NOISE OVERLAY ── */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:999;
  opacity:0.4;
}

/* ── HEADER ── */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(6,8,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 100;
}

.logo {
  font-family:'Clash Display',sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--accent);
}

.logo em {
  color: var(--muted2);
  font-style: normal;
  font-weight: 400;
  font-size: 11px;
  display: block;
  letter-spacing: 1px;
  font-family: 'DM Mono', monospace;
  margin-top: -2px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--muted2);
  letter-spacing: 0.5px;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2s ease infinite;
}

@keyframes blink {
  0%,100%{opacity:1} 50%{opacity:0.3}
}

/* ── TICKER SCROLL ── */
.ticker-wrap {
  overflow: hidden;
  border-bottom: 1px solid var(--border);
  background: var(--s1);
}

.ticker-track {
  display: flex;
  gap: 0;
  animation: ticker 30s linear infinite;
  width: max-content;
}

.ticker-track:hover { animation-play-state: paused; }

@keyframes ticker {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

.ticker-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 20px;
  border-right: 1px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  font-size: 12px;
}

.ticker-item:hover { background: var(--s2); }
.ticker-item.active-ticker { background: var(--s2); }

.ticker-sym { font-weight: 500; color: var(--text); }
.ticker-price { color: var(--muted2); }
.ticker-chg { font-weight: 500; font-size: 11px; }

/* ── LAYOUT ── */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 95px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
}

@media (max-width: 768px) {
  .app {
    grid-template-columns: 1fr;
    height: auto;
  }
  .sidebar { display: none; }
}

/* ── SIDEBAR ── */
.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--s1);
}

.sidebar::-webkit-scrollbar { width: 0; }

.coin-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}

.coin-row::before {
  content:'';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.15s;
}

.coin-row:hover { background: var(--s2); }
.coin-row.active { background: var(--s2); }
.coin-row.active::before { opacity: 1; }

.coin-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--s3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.coin-info { flex: 1; min-width: 0; }
.coin-name { font-family:'Clash Display',sans-serif; font-size:13px; font-weight:600; }
.coin-sym { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }

.coin-right { text-align: right; }
.coin-price { font-size: 13px; font-weight: 500; color: var(--text); }
.coin-chg { font-size: 11px; font-weight: 500; }

/* ── MAIN ── */
.main {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background: var(--bg);
}

.main::-webkit-scrollbar { width: 0; }

/* ── COIN HERO ── */
.coin-hero {
  padding: 24px 24px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.hero-left { display:flex; align-items:center; gap:14px; }

.hero-icon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--s2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  border: 1px solid var(--border2);
}

.hero-name {
  font-family: 'Clash Display', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1;
}

.hero-sym {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 1px;
}

.hero-price-wrap { text-align: right; }

.hero-price {
  font-family: 'Clash Display', sans-serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--accent);
}

.hero-chg-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  margin-top: 4px;
}

.badge-g { background: rgba(61,255,160,0.12); color: var(--green); }
.badge-r { background: rgba(255,68,102,0.12); color: var(--red); }

/* ── PERIOD TABS ── */
.period-row {
  display: flex;
  gap: 4px;
  padding: 16px 24px 12px;
  flex-wrap: wrap;
}

.p-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}

.p-btn:hover { color: var(--text); border-color: var(--border2); background: var(--s2); }

.p-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 500;
}

/* ── CHART ── */
.chart-box {
  padding: 0 16px;
  position: relative;
  flex-shrink: 0;
}

.chart-container {
  position: relative;
  height: 260px;
}

.chart-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(6,8,15,0.85);
  border-radius: 8px;
  z-index: 10;
  display: none;
}

.chart-overlay.show { display: flex; }

.spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 12px 24px;
}

@media (max-width: 480px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .stats-row .stat:last-child { display:none; }
}

.stat {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
}

.stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.stat-val { font-size: 14px; font-weight: 500; color: var(--text); }

/* ── SIMULATOR ── */
.sim-section {
  margin: 8px 24px 24px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.sim-header {
  font-family: 'Clash Display', sans-serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sim-header span { color: var(--accent2); }

.sim-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

@media (max-width: 500px) {
  .sim-grid { grid-template-columns: 1fr; }
}

.field label {
  display: block;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.field input {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}

.field input:focus { border-color: var(--accent); }

.field input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.4);
}

.sim-submit {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #000;
  font-family: 'Clash Display', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}

.sim-submit:hover { opacity: 0.9; transform: translateY(-1px); }
.sim-submit:active { transform: translateY(0); }
.sim-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.sim-error {
  font-size: 11px;
  color: var(--red);
  background: rgba(255,68,102,0.08);
  border: 1px solid rgba(255,68,102,0.2);
  border-radius: 6px;
  padding: 8px 12px;
  margin: 10px 0 0;
  display: none;
}

.sim-error.show { display: block; }

/* ── RESULT ── */
.sim-result {
  margin-top: 14px;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 16px;
  display: none;
  animation: fadeUp 0.3s ease;
}

.sim-result.show { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

.pnl-block {
  text-align: center;
  padding: 12px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}

.pnl-amount {
  font-family: 'Clash Display', sans-serif;
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
}

.pnl-pct {
  font-size: 14px;
  margin-top: 4px;
  font-weight: 500;
}

.result-lines { display: flex; flex-direction: column; gap: 8px; }

.r-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}

.r-line .rl { color: var(--muted); }
.r-line .rv { font-weight: 500; color: var(--text); }

.pos { color: var(--green); }
.neg { color: var(--red); }

/* ── EMPTY STATE ── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
  font-size: 13px;
  padding: 40px;
  text-align: center;
}

.empty-icon {
  font-size: 40px;
  opacity: 0.3;
}

/* ── MOBILE COIN LIST ── */
.mobile-list {
  display: none;
  padding: 12px;
  overflow-x: auto;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
}

.mobile-list::-webkit-scrollbar { display: none; }

@media (max-width: 768px) {
  .mobile-list { display: flex; }
}

.mobile-coin-chip {
  flex-shrink: 0;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  min-width: 80px;
}

.mobile-coin-chip.active {
  border-color: var(--accent);
  background: var(--s2);
}

.mcc-sym { font-size: 12px; font-weight: 500; }
.mcc-icon { font-size: 20px; margin-bottom: 2px; }
.mcc-chg { font-size: 10px; }

/* scrollbar global */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    Cryptime
    <em>BINANCE · TEMPS RÉEL</em>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span id="lastUpdate">—</span>
  </div>
</header>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-track" id="tickerTrack">
    <div style="display:flex;gap:0" id="tickerInner"></div>
    <div style="display:flex;gap:0" id="tickerInner2"></div>
  </div>
</div>

<!-- MOBILE CHIP LIST -->
<div class="mobile-list" id="mobileList"></div>

<!-- APP GRID -->
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div style="padding:12px 16px 8px;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border)">
      TOP MARCHÉS
    </div>
    <!-- dynamique -->
  </div>

  <!-- MAIN -->
  <div class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◎</div>
      <div>Sélectionne une crypto</div>
      <div style="font-size:11px;color:var(--muted)">dans la liste à gauche</div>
    </div>

    <!-- COIN DETAIL (caché au départ) -->
    <div id="coinDetail" style="display:none;flex-direction:column;flex:1;">
      <div class="coin-hero">
        <div class="hero-left">
          <div class="hero-icon" id="heroIcon">₿</div>
          <div>
            <div class="hero-name" id="heroName">Bitcoin</div>
            <div class="hero-sym" id="heroSym">BTC/USDT</div>
          </div>
        </div>
        <div class="hero-price-wrap">
          <div class="hero-price" id="heroPrice">—</div>
          <div class="hero-chg-badge badge-g" id="heroBadge">—</div>
        </div>
      </div>

      <div class="period-row">
        <button class="p-btn" data-interval="1m" data-limit="120">2H</button>
        <button class="p-btn" data-interval="1h" data-limit="168">1S</button>
        <button class="p-btn active" data-interval="4h" data-limit="180">1M</button>
        <button class="p-btn" data-interval="1d" data-limit="180">6M</button>
        <button class="p-btn" data-interval="1d" data-limit="365">1A</button>
        <button class="p-btn" data-interval="1d" data-limit="730">2A</button>
      </div>

      <div class="chart-box">
        <div class="chart-container">
          <div class="chart-overlay" id="chartOverlay"><div class="spinner"></div></div>
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">Prix d'ouverture</div>
          <div class="stat-val" id="statOpen">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Volume 24h</div>
          <div class="stat-val" id="statVol">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Variation 24h</div>
          <div class="stat-val" id="statChg">—</div>
        </div>
      </div>

      <!-- SIMULATEUR -->
      <div class="sim-section">
        <div class="sim-header">💸 <span>Simulateur</span></div>
        <div class="sim-grid">
          <div class="field">
            <label>Montant investi ($)</label>
            <input type="number" id="simAmount" placeholder="1000" min="1">
          </div>
          <div class="field">
            <label>Date d'achat</label>
            <input type="date" id="simDate">
          </div>
        </div>
        <button class="sim-submit" onclick="simulate()">Calculer la plus-value →</button>
        <div class="sim-error" id="simError"></div>
        <div class="sim-result" id="simResult">
          <div class="pnl-block">
            <div class="pnl-amount" id="pnlAmount">—</div>
            <div class="pnl-pct" id="pnlPct">—</div>
          </div>
          <div class="result-lines">
            <div class="r-line"><span class="rl">Investi</span><span class="rv" id="rInvest">—</span></div>
            <div class="r-line"><span class="rl">Prix d'achat</span><span class="rv" id="rBuy">—</span></div>
            <div class="r-line"><span class="rl">Quantité</span><span class="rv" id="rQty">—</span></div>
            <div class="r-line"><span class="rl">Prix actuel</span><span class="rv" id="rNow">—</span></div>
            <div class="r-line"><span class="rl">Valeur actuelle</span><span class="rv" id="rVal">—</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
const COINS = [
  { sym: 'BTCUSDT',  name: 'Bitcoin',   short: 'BTC', icon: '₿' },
  { sym: 'ETHUSDT',  name: 'Ethereum',  short: 'ETH', icon: 'Ξ' },
  { sym: 'BNBUSDT',  name: 'BNB',       short: 'BNB', icon: '◈' },
  { sym: 'SOLUSDT',  name: 'Solana',    short: 'SOL', icon: '◎' },
  { sym: 'XRPUSDT',  name: 'XRP',       short: 'XRP', icon: '✕' },
  { sym: 'DOGEUSDT', name: 'Dogecoin',  short: 'DOGE',icon: 'Ð' },
  { sym: 'ADAUSDT',  name: 'Cardano',   short: 'ADA', icon: '₳' },
  { sym: 'AVAXUSDT', name: 'Avalanche', short: 'AVAX',icon: '▲' },
  { sym: 'TRXUSDT',  name: 'TRON',      short: 'TRX', icon: '◉' },
  { sym: 'LINKUSDT', name: 'Chainlink', short: 'LINK',icon: '⬡' },
  { sym: 'DOTUSDT',  name: 'Polkadot',  short: 'DOT', icon: '●' },
  { sym: 'MATICUSDT',name: 'Polygon',   short: 'MATIC',icon:'⬟' },
  { sym: 'LTCUSDT',  name: 'Litecoin',  short: 'LTC', icon: 'Ł' },
  { sym: 'UNIUSDT',  name: 'Uniswap',   short: 'UNI', icon: '🦄' },
  { sym: 'ATOMUSDT', name: 'Cosmos',    short: 'ATOM',icon: '⚛' },
];

const BASE = 'https://api.binance.com/api/v3';

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let prices = {};     // sym → { price, change }
let selected = null; // coin object
let chart = null;
let chartAbort = null;
let currentInterval = '4h';
let currentLimit = 180;

// ════════════════════════════════════════════════
// FORMAT
// ════════════════════════════════════════════════
const fmt = (n) => {
  if (n == null || isNaN(n)) return '—';
  if (n >= 10000) return '$' + n.toLocaleString('fr-FR', {maximumFractionDigits:0});
  if (n >= 100)   return '$' + n.toFixed(2);
  if (n >= 1)     return '$' + n.toFixed(4);
  if (n >= 0.001) return '$' + n.toFixed(5);
  return '$' + n.toFixed(8);
};

const fmtVol = (n) => {
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
};

const fmtDate = (ts) => new Date(ts).toLocaleDateString('fr-FR', {
  day:'2-digit', month:'short', year:'numeric'
});

const clr = (v) => v >= 0 ? 'var(--green)' : 'var(--red)';
const cls = (v) => v >= 0 ? 'pos' : 'neg';

// ════════════════════════════════════════════════
// FETCH TICKER (all prices at once)
// ════════════════════════════════════════════════
async function fetchTicker() {
  try {
    const syms = COINS.map(c => `"${c.sym}"`).join(',');
    const res = await fetch(`${BASE}/ticker/24hr?symbols=[${syms}]`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    data.forEach(d => {
      prices[d.symbol] = {
        price:  parseFloat(d.lastPrice),
        change: parseFloat(d.priceChangePercent),
        open:   parseFloat(d.openPrice),
        vol:    parseFloat(d.quoteVolume),
      };
    });

    renderSidebar();
    renderTicker();
    renderMobileList();

    // update hero if coin selected
    if (selected) updateHero();

    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  } catch(e) {
    console.error('Ticker error:', e);
  }
}

// ════════════════════════════════════════════════
// RENDER SIDEBAR
// ════════════════════════════════════════════════
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const header = sb.querySelector('div');
  sb.innerHTML = '';
  sb.appendChild(header);

  COINS.forEach(coin => {
    const p = prices[coin.sym];
    if (!p) return;
    const isPos = p.change >= 0;
    const row = document.createElement('div');
    row.className = 'coin-row' + (selected?.sym === coin.sym ? ' active' : '');
    row.innerHTML = `
      <div class="coin-icon">${coin.icon}</div>
      <div class="coin-info">
        <div class="coin-name">${coin.name}</div>
        <div class="coin-sym">${coin.short}</div>
      </div>
      <div class="coin-right">
        <div class="coin-price">${fmt(p.price)}</div>
        <div class="coin-chg ${cls(p.change)}">${isPos?'▲':'▼'} ${Math.abs(p.change).toFixed(2)}%</div>
      </div>`;
    row.onclick = () => selectCoin(coin);
    sb.appendChild(row);
  });
}

// ════════════════════════════════════════════════
// RENDER TICKER
// ════════════════════════════════════════════════
function renderTicker() {
  const makeItems = () => COINS.map(coin => {
    const p = prices[coin.sym];
    if (!p) return '';
    const isPos = p.change >= 0;
    return `<div class="ticker-item" onclick="selectCoin(${JSON.stringify(coin).replace(/"/g,'&quot;')})">
      <span>${coin.icon}</span>
      <span class="ticker-sym">${coin.short}</span>
      <span class="ticker-price">${fmt(p.price)}</span>
      <span class="ticker-chg ${cls(p.change)}">${isPos?'+':''}${p.change.toFixed(2)}%</span>
    </div>`;
  }).join('');

  document.getElementById('tickerInner').innerHTML = makeItems();
  document.getElementById('tickerInner2').innerHTML = makeItems();
}

// ════════════════════════════════════════════════
// RENDER MOBILE LIST
// ════════════════════════════════════════════════
function renderMobileList() {
  const ml = document.getElementById('mobileList');
  ml.innerHTML = COINS.map(coin => {
    const p = prices[coin.sym];
    if (!p) return '';
    return `<div class="mobile-coin-chip ${selected?.sym===coin.sym?'active':''}" onclick="selectCoin(${JSON.stringify(coin).replace(/"/g,'&quot;')})">
      <div class="mcc-icon">${coin.icon}</div>
      <div class="mcc-sym">${coin.short}</div>
      <div class="mcc-chg ${cls(p.change)}">${p.change>=0?'+':''}${p.change.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
// SELECT COIN
// ════════════════════════════════════════════════
function selectCoin(coin) {
  if (typeof coin === 'string') {
    coin = COINS.find(c => c.sym === coin);
  }
  if (!coin) return;

  selected = coin;

  document.getElementById('emptyState').style.display = 'none';
  const detail = document.getElementById('coinDetail');
  detail.style.display = 'flex';

  updateHero();
  updateStats();

  // Re-highlight rows
  document.querySelectorAll('.coin-row').forEach(r => r.classList.remove('active'));
  document.querySelectorAll('.mobile-coin-chip').forEach(r => r.classList.remove('active'));

  renderSidebar();
  renderMobileList();

  // Clear previous simulator result
  document.getElementById('simResult').classList.remove('show');
  document.getElementById('simError').classList.remove('show');

  // Load chart with current period
  loadChart(coin.sym, currentInterval, currentLimit);
}

// ════════════════════════════════════════════════
// UPDATE HERO
// ════════════════════════════════════════════════
function updateHero() {
  if (!selected) return;
  const p = prices[selected.sym];
  if (!p) return;

  document.getElementById('heroIcon').textContent = selected.icon;
  document.getElementById('heroName').textContent = selected.name;
  document.getElementById('heroSym').textContent = selected.sym.replace('USDT', '') + '/USDT';

  document.getElementById('heroPrice').textContent = fmt(p.price);

  const badge = document.getElementById('heroBadge');
  const isPos = p.change >= 0;
  badge.textContent = `${isPos ? '▲ +' : '▼ '}${p.change.toFixed(2)}% 24h`;
  badge.className = 'hero-chg-badge ' + (isPos ? 'badge-g' : 'badge-r');
}

// ════════════════════════════════════════════════
// UPDATE STATS
// ════════════════════════════════════════════════
function updateStats() {
  if (!selected) return;
  const p = prices[selected.sym];
  if (!p) return;

  document.getElementById('statOpen').textContent = fmt(p.open);
  document.getElementById('statVol').textContent = fmtVol(p.vol);
  document.getElementById('statChg').textContent =
    (p.change >= 0 ? '+' : '') + p.change.toFixed(2) + '%';
  document.getElementById('statChg').className = 'stat-val ' + cls(p.change);
}

// ════════════════════════════════════════════════
// LOAD CHART — Binance klines
// ════════════════════════════════════════════════
async function loadChart(sym, interval, limit) {
  currentInterval = interval;
  currentLimit = limit;

  // Abort previous if any
  if (chartAbort) chartAbort.abort();
  chartAbort = new AbortController();

  const overlay = document.getElementById('chartOverlay');
  overlay.classList.add('show');

  try {
    const url = `${BASE}/klines?symbol=${sym}&interval=${interval}&limit=${limit}`;
    const res = await fetch(url, { signal: chartAbort.signal });
    if (!res.ok) throw new Error('klines ' + res.status);
    const klines = await res.json();

    const labels = klines.map(k => new Date(k[0]));
    const closes = klines.map(k => parseFloat(k[4]));

    drawChart(labels, closes);
  } catch(e) {
    if (e.name !== 'AbortError') console.error('Chart error:', e);
  } finally {
    overlay.classList.remove('show');
  }
}

// ════════════════════════════════════════════════
// DRAW CHART
// ════════════════════════════════════════════════
function drawChart(labels, values) {
  if (chart) { chart.destroy(); chart = null; }

  const isUp = values[values.length - 1] >= values[0];
  const color = isUp ? '#3dffa0' : '#ff4466';

  const ctx = document.getElementById('priceChart').getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 260);
  grad.addColorStop(0, isUp ? 'rgba(61,255,160,0.2)' : 'rgba(255,68,102,0.2)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  // Time unit
  let timeUnit = 'day';
  if (currentInterval === '1m' || currentInterval === '5m') timeUnit = 'minute';
  else if (currentInterval === '1h' || currentInterval === '4h') timeUnit = 'hour';

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: color,
        backgroundColor: grad,
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: color,
        fill: true,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111827',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#556070',
          bodyColor: '#f0f4ff',
          titleFont: { family: 'DM Mono', size: 10 },
          bodyFont: { family: 'DM Mono', size: 13 },
          padding: 10,
          callbacks: {
            title: (items) => {
              const d = new Date(items[0].parsed.x);
              return d.toLocaleDateString('fr-FR', {
                day:'2-digit', month:'short', year:'numeric',
                hour: timeUnit !== 'day' ? '2-digit' : undefined,
                minute: timeUnit === 'minute' ? '2-digit' : undefined
              });
            },
            label: (item) => '  ' + fmt(item.parsed.y)
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: timeUnit },
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: {
            color: '#556070',
            font: { family: 'DM Mono', size: 10 },
            maxTicksLimit: 7,
            maxRotation: 0
          },
          border: { display: false }
        },
        y: {
          position: 'right',
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: {
            color: '#556070',
            font: { family: 'DM Mono', size: 10 },
            callback: (v) => {
              if (v >= 10000) return '$' + (v/1000).toFixed(0) + 'k';
              if (v >= 1000) return '$' + v.toFixed(0);
              if (v >= 1) return '$' + v.toFixed(2);
              return '$' + v.toFixed(4);
            }
          },
          border: { display: false }
        }
      }
    }
  });
}

// ════════════════════════════════════════════════
// PERIOD TABS
// ════════════════════════════════════════════════
document.querySelector('.period-row').addEventListener('click', (e) => {
  const btn = e.target.closest('.p-btn');
  if (!btn || !selected) return;

  document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const interval = btn.dataset.interval;
  const limit = parseInt(btn.dataset.limit);
  loadChart(selected.sym, interval, limit);
});

// ════════════════════════════════════════════════
// SIMULATOR
// ════════════════════════════════════════════════
async function simulate() {
  const errEl = document.getElementById('simError');
  const resEl = document.getElementById('simResult');
  errEl.classList.remove('show');
  resEl.classList.remove('show');

  if (!selected) return showErr('Sélectionne une crypto d\'abord.');

  const amount = parseFloat(document.getElementById('simAmount').value);
  const dateStr = document.getElementById('simDate').value;

  if (!amount || amount <= 0) return showErr('Entre un montant valide.');
  if (!dateStr) return showErr('Entre une date d\'achat.');

  const buyDate = new Date(dateStr);
  const today = new Date();

  if (buyDate >= today) return showErr('La date doit être dans le passé.');
  if (buyDate < new Date('2017-01-01')) return showErr('Données Binance disponibles depuis 2017.');

  const btn = document.querySelector('.sim-submit');
  btn.disabled = true;
  btn.textContent = 'Calcul en cours...';

  try {
    // Get historical kline closest to buy date
    const startMs = buyDate.getTime();
    const endMs = startMs + 2 * 24 * 60 * 60 * 1000; // +2 days buffer

    const url = `${BASE}/klines?symbol=${selected.sym}&interval=1d&startTime=${startMs}&endTime=${endMs}&limit=3`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API ' + res.status);
    const klines = await res.json();

    if (!klines.length) return showErr('Pas de données pour cette date. Essaie une date plus récente.');

    const buyPrice = parseFloat(klines[0][4]); // close price
    const currentPrice = prices[selected.sym]?.price;

    if (!buyPrice || !currentPrice) return showErr('Erreur de données.');

    const qty = amount / buyPrice;
    const currentValue = qty * currentPrice;
    const pnl = currentValue - amount;
    const pnlPct = (pnl / amount) * 100;
    const isPos = pnl >= 0;
    const sym = selected.short;

    // Display
    document.getElementById('pnlAmount').textContent =
      (isPos ? '+' : '') + pnl.toLocaleString('fr-FR', {style:'currency',currency:'USD',maximumFractionDigits:2});
    document.getElementById('pnlAmount').className = 'pnl-amount ' + (isPos ? 'pos' : 'neg');

    document.getElementById('pnlPct').textContent =
      (isPos ? '▲ +' : '▼ ') + pnlPct.toFixed(2) + '%';
    document.getElementById('pnlPct').className = 'pnl-pct ' + (isPos ? 'pos' : 'neg');

    document.getElementById('rInvest').textContent =
      amount.toLocaleString('fr-FR', {style:'currency',currency:'USD'});
    document.getElementById('rBuy').textContent = fmt(buyPrice);
    document.getElementById('rQty').textContent =
      qty < 1 ? qty.toFixed(6) + ' ' + sym : qty.toFixed(4) + ' ' + sym;
    document.getElementById('rNow').textContent = fmt(currentPrice);
    document.getElementById('rVal').textContent =
      currentValue.toLocaleString('fr-FR', {style:'currency',currency:'USD',maximumFractionDigits:2});

    resEl.classList.add('show');

  } catch(e) {
    showErr('Erreur réseau. Réessaie.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Calculer la plus-value →';
  }
}

function showErr(msg) {
  const el = document.getElementById('simError');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
  document.querySelector('.sim-submit').disabled = false;
  document.querySelector('.sim-submit').textContent = 'Calculer la plus-value →';
}

// ════════════════════════════════════════════════
// DATE LIMITS
// ════════════════════════════════════════════════
const di = document.getElementById('simDate');
di.max = new Date().toISOString().split('T')[0];
di.min = '2017-07-01';

// ════════════════════════════════════════════════
// CHART.JS DATE ADAPTER (inline — no CDN needed)
// ════════════════════════════════════════════════
// Use built-in adapter via chartjs-adapter-date-fns
// Instead, we use a minimal custom time adapter
(function() {
  // Patch Chart.js to handle Date objects as timestamps
  // We use the built-in 'time' scale with manual adapters
  if (typeof Chart !== 'undefined' && Chart._adapters) {
    const adapter = Chart._adapters._date.prototype;
    // Override format
    const origFormat = adapter.format;
    adapter.format = function(time, fmt) {
      try { return origFormat.call(this, time, fmt); }
      catch(e) { return new Date(time).toLocaleDateString('fr-FR'); }
    };
  }
})();

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
async function init() {
  await fetchTicker();
  // Auto-select BTC on load
  selectCoin(COINS[0]);
  // Refresh every 10 seconds
  setInterval(fetchTicker, 10000);
}

// Load Chart.js time adapter from CDN then init
(function loadAdapter() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js';
  s.onload = init;
  s.onerror = init; // init anyway
  document.head.appendChild(s);
})();
</script>
